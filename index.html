<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>🔥 Habit Tracker</h1>

    <!-- Add Habit -->
    <div class="add-habit">
      <input id="habitInput" placeholder="Enter new habit..." />
      <button onclick="addHabit()">Add</button>
    </div>

    <!-- Habit List -->
    <ul id="habitList"></ul>

    <!-- AI Section -->
    <div class="ai-box">
      <h3>🤖 AI Assistant</h3>
      <input id="aiInput" placeholder="Ask something..." />
      <button onclick="askAI()">Ask</button>
      <p id="aiOutput"></p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
