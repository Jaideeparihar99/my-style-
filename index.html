<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Login Section -->
  <div id="loginSection" class="login-container">
    <div class="login-card">
      <h1 class="login-title">📊 Habit Tracker</h1>
      <p class="login-subtitle">Track your daily habits and build consistency</p>
      
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" class="btn-login">Login</button>
      </form>
      
      <p class="signup-text">New user? <button type="button" class="btn-toggle-signup" onclick="toggleSignup()">Sign up</button></p>
      
      <div id="signupForm" class="signup-form" style="display: none;">
        <h3>Create Account</h3>
        <div class="form-group">
          <input type="text" id="signupUsername" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
          <input type="password" id="signupPassword" placeholder="Create a password" required>
        </div>
        <button type="button" class="btn-signup" onclick="handleSignup()">Sign Up</button>
        <button type="button" class="btn-cancel-signup" onclick="toggleSignup()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Main App Section -->
  <div id="appSection" class="container" style="display: none;">
    <div class="header">
      <h1>📊 Habit Tracker</h1>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>

    <!-- Statistics Section -->
    <div class="stats-section">
      <div class="stat-card">
        <h3>Total Habits</h3>
        <p id="totalHabits">0</p>
      </div>
      <div class="stat-card">
        <h3>Completed Today</h3>
        <p id="completedToday">0</p>
      </div>
      <div class="stat-card">
        <h3>Completion Rate</h3>
        <p id="completionRate">0%</p>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-section">
      <h3>Overall Progress</h3>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <!-- Input Section -->
    <div class="input-section">
      <input type="text" id="habitInput" placeholder="Enter a habit">
      <button onclick="addHabit()" class="btn-add">Add Habit</button>
    </div>

    <!-- Habits List -->
    <ul id="habitList"></ul>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeEditModal()">&times;</span>
        <h2>Edit Habit</h2>
        <input type="text" id="editInput" placeholder="New habit name">
        <div class="modal-buttons">
          <button onclick="saveEdit()" class="btn-save">Save</button>
          <button onclick="closeEditModal()" class="btn-cancel">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
